name: Build Android (APK)

# Builds an installable .apk on a GitHub-hosted Ubuntu runner. The default
# Release variant is debug-signed by the Expo/RN template, so the APK installs
# directly on any Android device (`adb install` or just open the file) — no Play
# Store account, no signing setup, no re-signing step required.

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Gradle build variant"
        type: choice
        default: Release
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install monorepo deps
        run: npm ci
        working-directory: .

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK
        working-directory: mobile/android
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew "assemble${{ inputs.variant }}" --no-daemon

      - name: Package APK
        run: |
          set -euo pipefail
          VARIANT_LC=$(echo "${{ inputs.variant }}" | tr '[:upper:]' '[:lower:]')
          OUT_DIR="android/app/build/outputs/apk/$VARIANT_LC"
          echo "Searching under: $OUT_DIR"
          APK_PATH=$(find "$OUT_DIR" -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No .apk produced. Tree under outputs/:"
            find android/app/build/outputs -type f | head -50
            exit 1
          fi
          echo "APK at: $APK_PATH"
          VERSION=$(node -e "console.log(require('./app.json').expo.version)")
          OUT="$GITHUB_WORKSPACE/mobile/lift-${VERSION}-${VARIANT_LC}.apk"
          cp "$APK_PATH" "$OUT"
          ls -lh "$OUT"
          echo "APK_PATH=$OUT" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lift-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 14
